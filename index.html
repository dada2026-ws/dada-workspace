<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="达达工作台">
<meta name="theme-color" content="#4a6b3a">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><rect width='180' height='180' rx='36' fill='%234a6b3a'/><text x='90' y='115' text-anchor='middle' font-size='90'>📋</text></svg>">
<title>达达工作台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue","Microsoft YaHei",sans-serif;background:#f0f0f0;color:#1a1a1a;overflow:hidden}
.app{display:flex;height:100vh}
.sidebar{width:42%;min-width:150px;max-width:185px;background:#fff;border-right:1px solid #e8e8e8;display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:16px 14px 12px;border-bottom:1px solid #f0f0f0}
.sidebar-header .name{font-size:20px;font-weight:700;color:#2c5f2d}
.sidebar-header .sub{font-size:11px;color:#999;margin-top:2px}
.menu-list{flex:1;overflow-y:auto;padding:10px 8px}
.menu-item{display:flex;align-items:center;padding:13px 10px;margin-bottom:6px;font-size:14px;color:#333;border-radius:10px;cursor:pointer;transition:all .15s}
.menu-item:active{background:#f5f5f5}
.menu-item .icon{font-size:20px;margin-right:8px;width:24px;text-align:center}
.menu-item .label{flex:1;line-height:1.3}
.menu-item.active{background:#4a6b3a;color:#fff}
.main{flex:1;display:flex;flex-direction:column;background:#e8e8e8;overflow:hidden}
.main-header{padding:12px 14px;display:flex;justify-content:flex-end;align-items:center;gap:8px}
.main-title{font-size:15px;font-weight:600;color:#333;margin-right:auto}
.sync-btn{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.85);border:none;border-radius:18px;padding:6px 12px;font-size:12px;color:#333;box-shadow:0 1px 3px rgba(0,0,0,.06);cursor:pointer}
.content{flex:1;overflow-y:auto;padding:0 12px 16px}
.card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.card-sm{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.03)}
.section-title{font-size:13px;color:#999;margin-bottom:10px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.stat-card{background:#fff;border-radius:12px;padding:12px 8px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.stat-num{font-size:20px;font-weight:700;color:#2c5f2d}
.stat-num.pending{color:#e67e22}
.stat-num.todo{color:#c0392b}
.stat-num.rate{color:#2980b9}
.stat-label{font-size:11px;color:#999;margin-top:2px}
.task-item{display:flex;align-items:center;padding:13px 0;border-bottom:1px solid #f2f2f2;font-size:14px}
.task-item:last-child{border-bottom:none}
.task-check{width:20px;height:20px;border:1.5px solid #d0d0d0;border-radius:50%;margin-right:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;color:#fff;transition:all .15s}
.task-check.done{background:#4a6b3a;border-color:#4a6b3a}
.task-item.done .task-text{text-decoration:line-through;color:#aaa}
.task-text{flex:1}
.task-del{color:#ccc;cursor:pointer;padding:4px;font-size:16px}
.add-row{display:flex;gap:8px;margin-top:12px}
.add-input{flex:1;border:1px solid #e0e0e0;border-radius:10px;padding:10px 12px;font-size:14px;font-family:inherit}
.add-input:focus{outline:none;border-color:#4a6b3a}
.add-btn{background:#4a6b3a;color:#fff;border:none;border-radius:10px;padding:0 16px;font-size:14px;cursor:pointer;white-space:nowrap}
.idea-card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.idea-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.idea-num{font-size:12px;color:#999}
.idea-title{font-size:16px;font-weight:600;color:#1a1a1a;margin-bottom:6px;line-height:1.4}
.idea-desc{font-size:13px;color:#666;line-height:1.6;margin-bottom:12px}
.idea-tags{font-size:11px;color:#4a6b3a;margin-bottom:8px}
.idea-actions{display:flex;gap:8px;flex-wrap:wrap}
.idea-btn{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:16px;font-size:12px;cursor:pointer;border:1px solid #e0e0e0;background:#fff;color:#555;transition:all .15s}
.idea-btn:active{background:#f5f5f5}
.idea-btn.primary{background:#4a6b3a;color:#fff;border-color:#4a6b3a}
.refresh-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.refresh-date{font-size:12px;color:#999}
.refresh-btn{font-size:12px;color:#4a6b3a;cursor:pointer;border:none;background:none;display:flex;align-items:center;gap:4px}
.hot-card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.hot-rank{display:inline-block;background:#ff4757;color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;margin-bottom:8px}
.hot-rank.gold{background:#f39c12}
.hot-title{font-size:15px;font-weight:600;margin-bottom:6px;line-height:1.4}
.hot-reason{font-size:12px;color:#4a6b3a;margin-bottom:6px}
.hot-angle{font-size:13px;color:#555;line-height:1.5;margin-bottom:6px}
.hot-meta{font-size:11px;color:#bbb;margin-bottom:10px}
.hot-actions{display:flex;gap:8px;flex-wrap:wrap}
.violin-stage{background:#f9fbf7;border-radius:12px;padding:14px;margin-bottom:10px}
.violin-stage .stage-num{font-size:12px;color:#4a6b3a;font-weight:600}
.violin-stage .stage-title{font-size:15px;font-weight:600;margin:4px 0}
.violin-stage .stage-criteria{font-size:12px;color:#888;line-height:1.5}
.video-link{display:flex;align-items:center;gap:6px;padding:8px 0;color:#2980b9;font-size:13px;cursor:pointer;border-bottom:1px solid #f2f2f2}
.video-link:last-child{border-bottom:none}
.eng-article{font-size:14px;line-height:1.8;color:#333}
.eng-meta{display:flex;gap:16px;font-size:11px;color:#999;margin-bottom:12px}
.eng-meta span{display:flex;align-items:center;gap:4px}
.translate-toggle{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:16px;font-size:12px;cursor:pointer;border:1px solid #4a6b3a;color:#4a6b3a;background:#fff;margin:12px 0}
.translate-toggle.active{background:#4a6b3a;color:#fff}
.word-card{background:linear-gradient(135deg,#e8f5e9,#f1f8e9);border-radius:12px;padding:14px;text-align:center;margin-bottom:8px}
.word-en{font-size:22px;font-weight:700;color:#2c5f2d}
.word-phonetic{font-size:12px;color:#888;margin:4px 0}
.word-cn{font-size:14px;color:#555}
.word-train-btn{display:block;width:100%;text-align:center;padding:10px;margin-top:8px;background:#4a6b3a;color:#fff;border:none;border-radius:10px;font-size:14px;cursor:pointer}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.page{display:none}
.page.active{display:block}
.cn-text{display:none}
.cn-text.show{display:block}
.loading{text-align:center;padding:40px;color:#999}
.loading .spinner{display:inline-block;width:24px;height:24px;border:2px solid #e0e0e0;border-top-color:#4a6b3a;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-badge{display:inline-flex;align-items:center;gap:2px;font-size:10px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 6px;border-radius:8px;margin-left:4px}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="name">达达</div>
      <div class="sub">达达工作台</div>
    </div>
    <div class="menu-list">
      <div class="menu-item active" data-page="plan"><span class="icon">📋</span><span class="label">每日计划</span></div>
      <div class="menu-item" data-page="idea"><span class="icon">💡</span><span class="label">选题每日灵感</span></div>
      <div class="menu-item" data-page="hot"><span class="icon">🔥</span><span class="label">爆款热点视频/二创</span></div>
      <div class="menu-item" data-page="review"><span class="icon">📊</span><span class="label">内容复盘</span></div>
      <div class="menu-item" data-page="memo"><span class="icon">📝</span><span class="label">备忘录</span></div>
      <div class="menu-item" data-page="violin"><span class="icon">🎻</span><span class="label">小提琴练习</span></div>
      <div class="menu-item" data-page="english"><span class="icon">🌍</span><span class="label">英语学习</span></div>
    </div>
  </div>
  <div class="main">
    <div class="main-header">
      <span class="main-title" id="pageTitle">📋 每日计划</span>
      <button class="sync-btn" id="syncBtn">🔄 同步到手机</button>
    </div>
    <div class="content" id="contentArea"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ====== 配置 ======
const DS_API_KEY='sk-087c185169784a72880f903d48c86c0a';
const DS_URL='https://api.deepseek.com/v1/chat/completions';

// ====== 全局状态 ======
let currentPage='plan';
let showTranslation=false;
let tasks=JSON.parse(localStorage.getItem('dt_tasks3')||'[{"text":"脚本拍摄（文案+定景）","done":true},{"text":"配音（原声+后期）","done":true},{"text":"剪辑（发布片）","done":false},{"text":"音乐+文案（评论区）","done":false},{"text":"数据分析+互动","done":false}]');

// ====== AI 调用 ======
async function callAI(prompt){
  try{
    let r=await fetch(DS_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+DS_API_KEY},
      body:JSON.stringify({model:'deepseek-chat',messages:[{role:'user',content:prompt}],max_tokens:2000,temperature:0.8})
    });
    let d=await r.json();
    if(d.error)throw new Error(d.error.message);
    return d.choices[0].message.content;
  }catch(e){
    console.error('AI error:',e);
    return null;
  }
}

// ====== AI 灵感生成 ======
async function generateIdeas(){
  showLoading('idea');
  let prompt=`你是一个短视频创作顾问。我的账号定位是：个人成长、行动力、生活方式、独居生��。请生成3个选题灵感，每个包含：
- 标题（吸引人的、适合短视频）
- 一句话描述（为什么这个选题好）
- 标签（2个关键词）
请以JSON数组格式返回：[{"title":"...","desc":"...","tags":["...","..."]},...]
只返回JSON，不要其他文字。`;
  let resp=await callAI(prompt);
  if(!resp){showFallback('idea');return}
  try{
    let jsonStr=resp.replace(/```json|```/g,'').trim();
    let ideas=JSON.parse(jsonStr);
    localStorage.setItem('dt_ai_ideas',JSON.stringify({time:Date.now(),data:ideas}));
    renderIdeaContent(ideas);
  }catch(e){showFallback('idea')}
}

// ====== AI 热点生成 ======
async function generateHot(){
  showLoading('hot');
  let prompt=`你是一个短视频热点分析专家。我的账号定位：个人成长、行动力、生活方式。请推荐3个近期热门话题/视频趋势，每个包含：
- title: 热点标题
- reason: 为什么适合我二创（结合我的账号定位分析）
- angle: 具体改编角度建议
- source: 平台来源（抖音/B站/小红书）
- time: 热度时间（如"今日""昨日"）
请以JSON数组格式返回：[{"title":"...","reason":"...","angle":"...","source":"...","time":"..."},...]
只返回JSON。`;
  let resp=await callAI(prompt);
  if(!resp){showFallback('hot');return}
  try{
    let jsonStr=resp.replace(/```json|```/g,'').trim();
    let hots=JSON.parse(jsonStr);
    localStorage.setItem('dt_ai_hot',JSON.stringify({time:Date.now(),data:hots}));
    renderHotContent(hots);
  }catch(e){showFallback('hot')}
}

function showLoading(page){
  let el=document.getElementById('contentArea');
  el.innerHTML=`<div class="loading"><div class="spinner"></div><div style="margin-top:12px;font-size:13px;">AI 正在为你生成内容<span class="ai-badge">DeepSeek</span></div></div>`;
}
function showFallback(page){
  if(page==='idea')renderIdeaContent(null);
  if(page==='hot')renderHotContent(null);
  showToast('AI 生成失败，已加载备用内容');
}

// ====== 渲染每日��划 ======
function renderPlan(){
  let done=tasks.filter(t=>t.done).length;
  let total=tasks.length;
  let pending=tasks.filter(t=>!t.done).length;
  let rate=total?Math.round(done/total*100):0;
  return `<div class="stat-grid">
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">任务数</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#27ae60">${done}</div><div class="stat-label">已完成</div></div>
    <div class="stat-card"><div class="stat-num pending">${pending}</div><div class="stat-label">待完成</div></div>
    <div class="stat-card"><div class="stat-num rate">${rate}%</div><div class="stat-label">完成率</div></div>
  </div>
  <div class="card">
    <div class="section-title">📌 今日任务</div>
    <div>${tasks.map((t,i)=>`<div class="task-item${t.done?' done':''}"><div class="task-check${t.done?' done':''}" onclick="toggleTask(${i})">${t.done?'✓':''}</div><span class="task-text">${esc(t.text)}</span><span class="task-del" onclick="delTask(${i})">×</span></div>`).join('')}</div>
    <div class="add-row">
      <input type="text" class="add-input" id="taskInput" placeholder="添加新任务..." onkeypress="if(event.key==='Enter')addTask()">
      <button class="add-btn" onclick="addTask()">添加</button>
    </div>
  </div>`;
}
function toggleTask(i){tasks[i].done=!tasks[i].done;saveTasks();refreshContent()}
function delTask(i){tasks.splice(i,1);saveTasks();refreshContent()}
function addTask(){let v=document.getElementById('taskInput').value.trim();if(!v)return;tasks.push({text:v,done:false});document.getElementById('taskInput').value='';saveTasks();refreshContent()}
function saveTasks(){localStorage.setItem('dt_tasks3',JSON.stringify(tasks))}

// ====== 渲染灵感 ======
function renderIdeaContent(ideas){
  if(!ideas){
    // 备用
    ideas=[{title:'00后整顿职场的真实瞬间',desc:'从"行动力"切入，做真实故事分享，匹配年轻人焦虑情绪。',tags:['情感','热点']},{title:'独居女孩的一日 vlog',desc:'晨间仪式+居家工作+自我成长，传递松弛感。',tags:['生活','vlog']},{title:'5个AI提效工具实测',desc:'图文+视频双版本，工具清单+实操对比，结尾设置互动投票。',tags:['干货','科技']}];
  }
  let dateStr=new Date().toLocaleDateString('zh-CN',{month:'long',day:'numeric',weekday:'short'});
  return `<div class="refresh-bar">
    <div class="refresh-date">📅 ${dateStr} · AI 智能推荐 <span class="ai-badge">DeepSeek</span></div>
    <button class="refresh-btn" onclick="refreshIdeas()">🔄 AI 换一批</button>
  </div>
  ${ideas.map((idea,i)=>`<div class="idea-card">
    <div class="idea-header"><span class="idea-num">灵感 #${i+1}</span></div>
    <div class="idea-title">${esc(idea.title)}</div>
    <div class="idea-tags">${(idea.tags||[]).map(t=>'#'+t).join(' ')}</div>
    <div class="idea-desc">${esc(idea.desc)}</div>
    <div class="idea-actions">
      <button class="idea-btn" onclick="openSearch('douyin','${encodeURIComponent(idea.title)}')">🎵 看抖音相关</button>
      <button class="idea-btn" onclick="openSearch('bilibili','${encodeURIComponent(idea.title)}')">📺 B站相关</button>
      <button class="idea-btn primary" onclick="addIdeaAsTask('${esc(idea.title)}')">📋 加入任务</button>
    </div>
  </div>`).join('')}`;
}
async function refreshIdeas(){
  document.getElementById('contentArea').innerHTML=`<div class="loading"><div class="spinner"></div><div style="margin-top:12px;font-size:13px;">AI 正在生成新灵感<span class="ai-badge">DeepSeek</span></div></div>`;
  await generateIdeas();
}
function addIdeaAsTask(title){tasks.push({text:'选题：'+title,done:false});saveTasks();showToast('已加入今日任务 ✓')}

// ====== 渲染热点 ======
function renderHotContent(hots){
  if(!hots){
    hots=[{title:'AI时代，行动力才是唯一壁垒',reason:'你的账号定位"行动力"与此热点高度契合',angle:'以"我用���AI之后反而更忙了"为切入点，反向输出观点',source:'抖音热榜',time:'今日'},{title:'下班后2小时自我提升清单',reason:'与你的"行动力"系列方向一致',angle:'加入你自己的真实2小时安排，对比网上的"完美清单"',source:'B站热门',time:'昨日'},{title:'00后创业真实记录',reason:'情感共鸣强，你的受众画像匹配',angle:'从"普通人视角"做观察评论，而非跟风创业',source:'抖音热榜',time:'今日'}];
  }
  let dateStr=new Date().toLocaleDateString('zh-CN',{month:'long',day:'numeric',weekday:'short'});
  return `<div class="refresh-bar">
    <div class="refresh-date">📅 ${dateStr} · AI 热点分析 <span class="ai-badge">DeepSeek</span></div>
    <button class="refresh-btn" onclick="refreshHot()">🔄 AI 换一批</button>
  </div>
  ${hots.map((h,i)=>`<div class="hot-card">
    <div class="hot-rank${i===0?' gold':''}">🔥 TOP ${i+1}</div>
    <div class="hot-title">${esc(h.title)}</div>
    <div class="hot-reason">💡 ${esc(h.reason)}</div>
    <div class="hot-angle">✏️ 改编角度：${esc(h.angle)}</div>
    <div class="hot-meta">来源：${esc(h.source||'热门平台')} · ${esc(h.time||'今日')}</div>
    <div class="hot-actions">
      <button class="idea-btn primary" onclick="addHotAsTask('${esc(h.title)}')">📋 加入任务</button>
      <button class="idea-btn" onclick="saveAsIdea('${esc(h.title)}','${esc(h.angle||'')}')">💡 存为灵感</button>
      <button class="idea-btn" onclick="refreshHot()">🔄 换视频</button>
    </div>
  </div>`).join('')}`;
}
async function refreshHot(){
  document.getElementById('contentArea').innerHTML=`<div class="loading"><div class="spinner"></div><div style="margin-top:12px;font-size:13px;">AI 正在分析最新热点<span class="ai-badge">DeepSeek</span></div></div>`;
  await generateHot();
}
function addHotAsTask(title){tasks.push({text:'二创：'+title,done:false});saveTasks();showToast('已加入今日任务 ✓')}
function saveAsIdea(title,angle){showToast('灵感已保存 📌')}

// ====== 渲染复盘 ======
function renderReview(){
  return `<div class="stat-grid">
    <div class="stat-card"><div class="stat-num">28</div><div class="stat-label">本月发布</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#27ae60">8.7w</div><div class="stat-label">平均点赞</div></div>
    <div class="stat-card"><div class="stat-num pending">2.4w</div><div class="stat-label">平均评论</div></div>
    <div class="stat-card"><div class="stat-num rate">4.3w</div><div class="stat-label">平均收藏</div></div>
  </div>
  <div class="card"><div class="section-title">✅ 本月爆款 TOP 3</div><div style="font-size:13px;color:#555;line-height:2;">1. 《AI提效工具实测》— 完播率 68%，涨粉 1.2w<br>2. 《独居女孩的一天》— 点赞 2.8w，收藏 1.5w<br>3. 《下班2小时计划》— 评论区 3k+，互动率 12%</div></div>
  <div class="card"><div class="section-title">⚠️ 待优化</div><div style="font-size:13px;color:#555;line-height:2;">• 标题吸引力不足（3条数据低于均值）<br>• 视频前3秒钩子需要加强<br>• 评论区互动响应待提速</div></div>`;
}

// ====== 备忘录 ======
function renderMemo(){
  let memos=JSON.parse(localStorage.getItem('dt_memos3')||'[{"text":"下周二品牌合作沟通","time":"2026-07-22"},{"text":"选题方向：把行动力做成系列内容","time":"2026-07-19"}]');
  return memos.map((m,i)=>`<div class="card-sm"><div style="font-size:14px;color:#555;line-height:1.6;">${esc(m.text)}</div><div style="font-size:11px;color:#bbb;margin-top:6px;">${m.time}</div><span style="font-size:12px;color:#e74c3c;cursor:pointer;float:right;margin-top:-18px" onclick="delMemo(${i})">删除</span></div>`).join('')+`<div class="add-row" style="margin-top:8px;"><input type="text" class="add-input" id="memoInput" placeholder="写点什么..." onkeypress="if(event.key==='Enter')addMemo()"><button class="add-btn" onclick="addMemo()">保存</button></div>`;
}
function addMemo(){let v=document.getElementById('memoInput').value.trim();if(!v){showToast('内容不能为空');return}let memos=JSON.parse(localStorage.getItem('dt_memos3')||'[]');memos.unshift({text:v,time:new Date().toISOString().split('T')[0]});localStorage.setItem('dt_memos3',JSON.stringify(memos));document.getElementById('memoInput').value='';refreshContent();showToast('已保存 ✓')}
function delMemo(i){let memos=JSON.parse(localStorage.getItem('dt_memos3')||'[]');memos.splice(i,1);localStorage.setItem('dt_memos3',JSON.stringify(memos));refreshContent();showToast('已删除')}

// ====== 小提琴 ======
function renderViolin(){
  let practice=JSON.parse(localStorage.getItem('dt_practice2')||'[]');
  let today=new Date().toISOString().split('T')[0];
  let doneToday=practice.includes(today);
  let monthDays=practice.filter(d=>d.startsWith('2026-07')).length;
  return `<div class="stat-grid">
    <div class="stat-card"><div class="stat-num">${monthDays}</div><div class="stat-label">本月已练</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#27ae60">3</div><div class="stat-label">连续打卡</div></div>
    <div class="stat-card"><div class="stat-num pending">30</div><div class="stat-label">本月目标</div></div>
    <div class="stat-card"><div class="stat-num rate">${Math.round(monthDays/30*100)}%</div><div class="stat-label">完成率</div></div>
  </div>
  <div class="card"><div class="section-title">🎯 阶段一</div><div class="violin-stage"><div class="stage-num">阶段 1</div><div class="stage-title">空弦练习 · 弓法控制</div><div class="stage-criteria">过关标准：每条空弦连续拉10弓不碰邻弦</div></div></div>
  <div class="card"><div class="section-title">🎯 阶段二</div><div class="violin-stage"><div class="stage-num">阶段 2</div><div class="stage-title">卡农 · 高把位换弦</div><div class="stage-criteria">过关标准：完整演奏D段，换弦流畅</div></div></div>
  <div class="card"><div class="section-title">📺 推荐教学</div>
    <div class="video-link" onclick="openSearch('bilibili','小提琴空弦练习')">🎬 B站：小提琴空弦基本功练习</div>
    <div class="video-link" onclick="openSearch('bilibili','卡农小提琴教学')">🎬 B站：卡农小提琴逐句教学</div>
    <div class="video-link" onclick="openSearch('douyin','小提琴换弦技巧')">🎵 抖音：小提琴换弦技巧</div>
  </div>
  <button class="word-train-btn" onclick="practiceToday()" style="${doneToday?'background:#aaa':''}">${doneToday?'✅ 今日已打卡':'🎻 今日打卡'}</button>`;
}
function practiceToday(){let today=new Date().toISOString().split('T')[0];let practice=JSON.parse(localStorage.getItem('dt_practice2')||'[]');if(practice.includes(today)){showToast('今天已经打过卡了~');return}practice.push(today);localStorage.setItem('dt_practice2',JSON.stringify(practice));refreshContent();showToast('打卡成功 🎻')}

// ====== 英语 ======
function renderEnglish(){
  return `<div class="card">
    <div class="eng-article">
      <div style="font-size:16px;font-weight:700;margin-bottom:10px;">The Power of Taking Action</div>
      <div class="eng-meta"><span>📝 词汇量: 320</span><span>🎧 音频时长: 3:20</span><span>⭐ B1</span></div>
      <p>In a world full of plans and strategies, the one thing that separates dreamers from achievers is action. You can read a hundred books on swimming, but you will never learn until you jump into the water.</p>
      <p style="margin-top:8px;">The same applies to content creation. Many creators spend weeks perfecting their first video, only to realize that the real learning happens after you hit "publish."</p>
      <button class="translate-toggle${showTranslation?' active':''}" onclick="toggleTranslation()">🌐 ${showTranslation?'隐藏译文':'显示译文'}</button>
      <div class="cn-text${showTranslation?' show':''}" style="font-size:14px;color:#555;line-height:1.8;margin-top:8px;">
        <p>在一个充满计划和策略的世界里，区分梦想者和成就者的唯一因素是行动。你可以读一百本关于游泳的书，但只有跳进水里才能真正学会。</p>
        <p style="margin-top:8px;">内容创作也是如此。很多创作者花几周时间打磨第一个视频，却发现真正的学习发生在点击"发布"之后。</p>
      </div>
    </div>
  </div>
  <div class="card"><div class="section-title">📚 今日单词</div>
    <div class="word-card"><div class="word-en">resilience</div><div class="word-phonetic">/rɪˈzɪliəns/</div><div class="word-cn">n. 韧性；恢复力</div></div>
    <div class="word-card"><div class="word-en">momentum</div><div class="word-phonetic">/məˈmentəm/</div><div class="word-cn">n. 势头；动力</div></div>
    <button class="word-train-btn" onclick="showToast('单词训练模式即将开放 🚀')">📝 开始单词训练</button>
  </div>`;
}
function toggleTranslation(){showTranslation=!showTranslation;refreshContent()}

// ====== 通用 ======
function esc(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function showToast(msg){let t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2000)}
function openSearch(platform,keyword){let urls={douyin:'https://www.douyin.com/search/',bilibili:'https://search.bilibili.com/all?keyword='};showToast('正在跳转'+platform+'...');setTimeout(()=>window.open(urls[platform]+keyword,'_blank'),300)}

async function refreshContent(){
  let html='';
  switch(currentPage){
    case 'plan':html=renderPlan();break;
    case 'review':html=renderReview();break;
    case 'memo':html=renderMemo();break;
    case 'violin':html=renderViolin();break;
    case 'english':html=renderEnglish();break;
    case 'idea':
      let cacheIdea=JSON.parse(localStorage.getItem('dt_ai_ideas')||'null');
      if(cacheIdea&&(Date.now()-cacheIdea.time<3600000)){
        html=renderIdeaContent(cacheIdea.data);
      }else{
        document.getElementById('contentArea').innerHTML=`<div class="loading"><div class="spinner"></div><div style="margin-top:12px;font-size:13px;">AI 正在生成灵感<span class="ai-badge">DeepSeek</span></div></div>`;
        await generateIdeas();
        return;
      }
      break;
    case 'hot':
      let cacheHot=JSON.parse(localStorage.getItem('dt_ai_hot')||'null');
      if(cacheHot&&(Date.now()-cacheHot.time<3600000)){
        html=renderHotContent(cacheHot.data);
      }else{
        document.getElementById('contentArea').innerHTML=`<div class="loading"><div class="spinner"></div><div style="margin-top:12px;font-size:13px;">AI 正在分析热点<span class="ai-badge">DeepSeek</span></div></div>`;
        await generateHot();
        return;
      }
      break;
  }
  document.getElementById('contentArea').innerHTML=html;
}

let titles={plan:'📋 每日计划',idea:'💡 选题每日灵感',hot:'🔥 爆款热点视频/二创',review:'📊 内容复盘',memo:'📝 备忘录',violin:'🎻 小提琴练习',english:'🌍 英语学习'};

document.querySelectorAll('.menu-item').forEach(item=>{
  item.addEventListener('click',()=>{
    let p=item.dataset.page;
    document.querySelector('.menu-item.active').classList.remove('active');
    item.classList.add('active');
    currentPage=p;
    document.getElementById('pageTitle').textContent=titles[p];
    refreshContent();
  });
});
document.getElementById('syncBtn').onclick=()=>showToast('已同步到手机 ✓');
refreshContent();
</script>
</body>
</html>
